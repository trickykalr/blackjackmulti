<style>
  :root {<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050f09">
<title>Black Jack — Casino Royal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0:       #050f09;
    --bg1:       #091a10;
    --bg2:       #0d2418;
    --bg3:       #122d1e;
    --felt:      #0b3320;
    --border:    rgba(180,145,50,.22);
    --border-hi: rgba(201,168,76,.55);
    --gold:      #c9a84c;
    --gold-lt:   #e8c97a;
    --gold-dk:   #8a6f2e;
    --gold-dim:  rgba(201,168,76,.18);
    --cream:     #f0e8d0;
    --cream-dim: rgba(240,232,208,.55);
    --red-card:  #b91c1c;
    --chip-r:    #dc2626;
    --chip-b:    #1d4ed8;
    --chip-g:    #15803d;
    --chip-k:    #1e293b;
    --chip-p:    #6d28d9;
    --safe-b:    env(safe-area-inset-bottom,0px);
    --bar-h:     76px;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 18px;
  }

  /* ══ RESET & BASE ══ */
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body {
    font-family: 'Lora', serif;
    background: var(--bg0);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(12,80,40,.55) 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.012'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ══ ANIMATIONS ══ */
  @keyframes coinFall   { 0%{transform:translateY(-80px) rotate(0);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
  @keyframes bjPulse    { from{transform:scale(1);text-shadow:0 0 60px rgba(201,168,76,.9);} to{transform:scale(1.07);text-shadow:0 0 120px rgba(201,168,76,1),0 0 6px #fff;} }
  @keyframes bjFadeIn   { from{opacity:0;} to{opacity:1;} }
  @keyframes bjFadeOut  { from{opacity:1;} to{opacity:0;} }
  @keyframes dealCard   { from{transform:translateY(-30px) rotate(-8deg) scale(.7);opacity:0;} to{transform:translateY(0) rotate(0) scale(1);opacity:1;} }
  @keyframes popIn      { from{transform:scale(.75);opacity:0;} to{transform:scale(1);opacity:1;} }
  @keyframes slideUp    { from{transform:translateY(16px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  @keyframes shimmer    { 0%,100%{opacity:.4;} 50%{opacity:.75;} }
  @keyframes spin       { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ══ LOGO ══ */
  .logo { text-align: center; }
  .logo h1 {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: .06em;
    font-size: clamp(2rem, 9vw, 5rem);
    line-height: 1.1;
    text-shadow: 0 2px 30px rgba(201,168,76,.35), 0 0 80px rgba(201,168,76,.12);
  }
  .logo .sub {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    color: var(--gold-dk);
    letter-spacing: .35em;
    text-transform: uppercase;
    font-size: clamp(.6rem, 2vw, .8rem);
    margin-top: 6px;
  }
  .suits {
    display: flex; gap: 16px; justify-content: center;
    font-size: clamp(.9rem, 3vw, 1.3rem);
    color: var(--gold); opacity: .3; margin-top: 8px;
  }

  /* ══ BOÎTE COMMUNE ══ */
  .card-box {
    background: linear-gradient(145deg, rgba(13,36,24,.92), rgba(9,26,16,.96));
    border: 1px solid var(--border);
    border-top-color: var(--border-hi);
    border-radius: var(--radius-lg);
    padding: clamp(20px,5vw,36px);
    width: 100%; max-width: 440px;
    box-shadow: 0 24px 64px rgba(0,0,0,.6), 0 0 0 1px rgba(0,0,0,.4), inset 0 1px 0 rgba(201,168,76,.08);
    backdrop-filter: blur(16px);
  }
  .card-box h2 {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    color: var(--gold);
    text-align: center;
    margin-bottom: 22px;
    letter-spacing: .1em;
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    text-shadow: 0 0 24px rgba(201,168,76,.25);
  }

  /* ══ CHAMPS ══ */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: .64rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--gold-dk);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: rgba(0,0,0,.35);
    border: 1px solid rgba(201,168,76,.22);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--cream);
    font-family: 'Lora', serif;
    font-size: .95rem;
    outline: none;
    -webkit-appearance: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,.1);
  }
  .field input::placeholder { color: rgba(240,232,208,.22); }
  .field select option { background: #0d2418; }

  .radio-group { display: flex; gap: 8px; }
  .radio-group label {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    background: rgba(0,0,0,.22);
    border: 1px solid rgba(201,168,76,.18);
    border-radius: var(--radius-sm);
    padding: 12px 8px; cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: .78rem; letter-spacing: .06em;
    min-height: 46px; transition: all .2s;
  }
  .radio-group input[type=radio] { accent-color: var(--gold); width: 15px; height: 15px; }
  .radio-group label:has(input:checked) {
    border-color: var(--gold);
    background: rgba(201,168,76,.09);
    color: var(--gold);
    box-shadow: inset 0 0 0 1px rgba(201,168,76,.15);
  }

  /* ══ BOUTONS PRINCIPAUX ══ */
  .btn-gold {
    width: 100%;
    background: linear-gradient(160deg, #c9a84c, #8a6f2e 60%, #c9a84c);
    background-size: 200% 100%;
    border: none; border-radius: var(--radius-sm);
    padding: 14px 20px;
    color: #050f09;
    font-family: 'Cinzel', serif;
    font-size: .95rem; font-weight: 700;
    cursor: pointer; letter-spacing: .12em;
    transition: all .25s;
    box-shadow: 0 4px 20px rgba(201,168,76,.28), inset 0 1px 0 rgba(255,255,255,.2);
    min-height: 52px;
    text-transform: uppercase;
  }
  .btn-gold:hover { background-position: 100% 0; box-shadow: 0 6px 28px rgba(201,168,76,.38); }
  .btn-gold:active { transform: scale(.97); }
  .btn-gold:disabled { opacity: .38; cursor: not-allowed; transform: none; }

  .btn-outline-red {
    width: 100%;
    background: none;
    border: 1px solid rgba(185,28,28,.4);
    border-radius: var(--radius-sm);
    padding: 12px 20px; color: #ef8080;
    font-family: 'Cinzel', serif;
    font-size: .85rem; letter-spacing: .08em;
    cursor: pointer; min-height: 48px; transition: all .2s;
  }
  .btn-outline-red:active { background: rgba(185,28,28,.1); }

  /* ══ ÉCRAN JOIN ══ */
  #screenJoin {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 16px; gap: 30px;
  }
  .join-error { color: #f87171; font-size: .84rem; text-align: center; margin-top: 10px; font-style: italic; min-height: 18px; }
  #roomCodeBanner {
    display: none; margin-top: 18px; text-align: center;
    background: rgba(201,168,76,.08);
    border: 1px solid rgba(201,168,76,.28);
    border-radius: var(--radius-md); padding: 16px 22px;
  }
  #roomCodeBanner p { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-dk); margin-bottom:6px; }
  #roomCodeDisplay { font-family:'Cinzel Decorative',serif; font-size:2.2rem; color:var(--gold); letter-spacing:.3em; font-weight:700; text-shadow:0 0 30px rgba(201,168,76,.3); }

  /* ══ LOBBY ══ */
  #screenLobby { display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:24px 16px; gap:22px; }
  #lobbyPlayersList { list-style:none; display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .lobby-player {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,.25);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    animation: slideUp .25s ease;
    transition: border-color .2s;
  }
  .lobby-player.me { border-color: rgba(201,168,76,.45); background: rgba(201,168,76,.04); }
  .lp-role { font-size: 1.2rem; flex-shrink: 0; }
  .lp-name { flex:1; font-size:.9rem; font-family:'Lora',serif; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lp-name em { color:var(--gold-dk); font-size:.76rem; }
  .lp-bal { font-size:.72rem; color:var(--gold-dk); flex-shrink:0; font-family:'Cinzel',serif; letter-spacing:.06em; }
  .waiting-msg { text-align:center; color:var(--gold-dk); font-style:italic; font-size:.84rem; padding:10px 12px; background:rgba(0,0,0,.18); border-radius:var(--radius-sm); margin-bottom:10px; border:1px solid var(--border); }
  .lobby-btn-group { display:flex; flex-direction:column; gap:10px; }

  /* ══ ÉCRAN JEU ══ */
  #screenGame { display:none; min-height:100vh; padding:14px 12px calc(var(--bar-h) + var(--safe-b) + 14px); }
  .game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding:0 2px; }
  .game-title { font-family:'Cinzel Decorative',serif; color:var(--gold); font-size:clamp(.8rem,3vw,1rem); letter-spacing:.06em; text-shadow:0 0 20px rgba(201,168,76,.25); }
  .btn-quit {
    background:none; border:1px solid var(--border); color:var(--gold-dk);
    border-radius:var(--radius-sm); padding:8px 14px; cursor:pointer;
    font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.08em; min-height:36px;
    transition:all .2s;
  }
  .btn-quit:hover { border-color:var(--gold-dk); color:var(--gold); }

  .phase-banner {
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:clamp(.7rem,2.5vw,.88rem);
    color:var(--gold);
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:12px;
    min-height:20px;
    opacity:.85;
  }

  /* ── Dealer zone ── */
  .dealer-zone {
    background: linear-gradient(145deg, rgba(9,36,22,.9), rgba(5,20,12,.95));
    border: 1px solid var(--border);
    border-top: 1px solid var(--border-hi);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 12px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(201,168,76,.06);
  }
  .zone-label {
    font-family: 'Cinzel', serif;
    font-size: .6rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--gold-dk); margin-bottom: 6px;
  }
  .dealer-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(.85rem,3vw,1.05rem);
    color: var(--gold); margin-bottom: 12px;
    letter-spacing: .08em;
  }

  /* ══ CARTES ══ */
  .hand {
    display: flex; gap: 7px; justify-content: center; align-items: center;
    overflow-x: auto; padding: 4px 4px 10px;
    min-height: 96px;
    scrollbar-width: none; -ms-overflow-style: none; flex-wrap: nowrap;
  }
  .hand::-webkit-scrollbar { display: none; }

  /* Carte redesignée avec vrais indices de coin */
  .card {
    width: clamp(52px,14vw,68px);
    height: clamp(74px,20vw,96px);
    border-radius: 7px;
    background: #fafaf8;
    flex-shrink: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: auto 1fr auto;
    padding: 4px 5px;
    box-shadow:
      0 2px 0 rgba(0,0,0,.15),
      0 6px 18px rgba(0,0,0,.5),
      inset 0 0 0 1px rgba(0,0,0,.08);
    border: none;
    animation: dealCard .38s cubic-bezier(.175,.885,.32,1.275);
    position: relative;
    overflow: hidden;
  }
  /* Ligne décorative subtile en fond de carte */
  .card::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(0,0,0,.06);
    border-radius: 4px;
    pointer-events: none;
  }

  /* Coin haut-gauche */
  .card .ci-tl {
    grid-row: 1; grid-column: 1;
    display: flex; flex-direction: column; align-items: center; line-height: 1;
  }
  /* Coin bas-droite (retourné) */
  .card .ci-br {
    grid-row: 3; grid-column: 3;
    display: flex; flex-direction: column; align-items: center; line-height: 1;
    transform: rotate(180deg);
  }
  /* Suit central */
  .card .ci-center {
    grid-row: 2; grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: center;
  }

  .ci-rank { font-size: clamp(.62rem,2.2vw,.78rem); font-weight: 800; line-height: 1; font-family: 'Georgia', serif; }
  .ci-suit { font-size: clamp(.55rem,1.8vw,.68rem); line-height: 1; }
  .ci-suit-lg { font-size: clamp(1.2rem,4vw,1.7rem); line-height: 1; }

  .card.red .ci-rank, .card.red .ci-suit, .card.red .ci-suit-lg { color: var(--red-card); }
  .card.black-card .ci-rank, .card.black-card .ci-suit, .card.black-card .ci-suit-lg { color: #1a1a1a; }

  /* Carte cachée */
  .card.hidden {
    background: none;
    background-color: #1a3a5c;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0, rgba(255,255,255,.04) 1px, transparent 1px, transparent 8px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,.04) 0, rgba(255,255,255,.04) 1px, transparent 1px, transparent 8px);
    border: 2px solid rgba(255,255,255,.12);
    box-shadow: 0 6px 18px rgba(0,0,0,.5);
  }
  .card.hidden::before { border-color: rgba(255,255,255,.08); }
  .card.hidden::after {
    content: '♠';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; color: rgba(255,255,255,.08);
  }

  .hand-value {
    margin-top: 8px;
    font-family: 'Cinzel', serif;
    font-size: clamp(.72rem,2.5vw,.88rem);
    color: var(--cream-dim);
    letter-spacing: .06em;
  }
  .hand-value .bust { color: #f87171; }
  .hand-value .blackjack { color: var(--gold); animation: shimmer 1.4s ease-in-out infinite; }

  /* Actions croupier */
  .dealer-actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
  .btn-dealer {
    border: 1px solid var(--border-hi);
    background: rgba(201,168,76,.08);
    color: var(--gold);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: .78rem; letter-spacing: .1em; text-transform: uppercase;
    min-height: 44px; transition: all .2s;
    box-shadow: 0 2px 12px rgba(201,168,76,.1);
  }
  .btn-dealer:hover { background:rgba(201,168,76,.16); box-shadow:0 4px 20px rgba(201,168,76,.2); }
  .btn-dealer:active { transform:scale(.96); }
  .btn-dealer:disabled { opacity:.35; cursor:not-allowed; transform:none; }

  /* ══ ZONE JOUEURS ══ */
  .players-zone { display:grid; grid-template-columns:repeat(auto-fit,minmax(min(100%,250px),1fr)); gap:10px; }
  .player-card {
    background: linear-gradient(145deg, rgba(9,36,22,.88), rgba(5,20,12,.92));
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px; position: relative;
    transition: all .25s;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  .player-card.active {
    border-color: var(--gold);
    border-top-color: var(--gold-lt);
    box-shadow: 0 0 0 1px rgba(201,168,76,.12), 0 8px 32px rgba(201,168,76,.12);
    background: linear-gradient(145deg, rgba(12,40,24,.92), rgba(8,28,16,.96));
  }
  .player-card.done { opacity: .55; }
  .pc-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(.82rem,2.8vw,.98rem);
    color: var(--gold);
    margin-bottom: 2px;
    letter-spacing: .06em;
  }
  .pc-balance {
    font-size: .72rem; color: var(--gold-dk);
    margin-bottom: 10px;
    font-family: 'Lora', serif;
    font-style: italic;
  }

  /* Badges */
  .active-badge {
    position: absolute; top: 10px; right: 10px;
    background: linear-gradient(135deg, var(--gold-dk), var(--gold));
    color: #050f09;
    font-family: 'Cinzel', serif;
    font-size: .55rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 20px;
    box-shadow: 0 2px 8px rgba(201,168,76,.3);
  }
  .bust-badge  { background:linear-gradient(135deg,#991b1b,#dc2626) !important; color:white !important; box-shadow:0 2px 8px rgba(220,38,38,.35) !important; }
  .stand-badge { background:linear-gradient(135deg,#1e40af,#2563eb) !important; color:white !important; box-shadow:0 2px 8px rgba(37,99,235,.35) !important; }

  /* ══ JETONS ══ */
  .bet-section { margin-bottom: 10px; }
  .bet-label {
    font-family: 'Cinzel', serif;
    font-size: .6rem; color: rgba(240,232,208,.38);
    letter-spacing: .18em; text-transform: uppercase; margin-bottom: 8px;
  }
  .chips { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:9px; }
  .chip {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: .65rem; font-weight: 700;
    cursor: pointer; flex-shrink: 0;
    transition: transform .12s, box-shadow .12s;
    position: relative;
    /* Effet bord dentelé via outline + box-shadow */
    outline: 3px dashed rgba(255,255,255,.3);
    outline-offset: -6px;
  }
  .chip::after {
    content: '';
    position: absolute; inset: 3px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.18);
    pointer-events: none;
  }
  .chip:active { transform:scale(.84); }
  .chip:hover  { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.5); }

  .chip.c5   { background:radial-gradient(circle at 35% 35%, #f87171, var(--chip-r)); color:#fff; box-shadow:0 3px 12px rgba(220,38,38,.4), inset 0 1px 0 rgba(255,255,255,.2); }
  .chip.c10  { background:radial-gradient(circle at 35% 35%, #60a5fa, var(--chip-b)); color:#fff; box-shadow:0 3px 12px rgba(29,78,216,.4), inset 0 1px 0 rgba(255,255,255,.2); }
  .chip.c25  { background:radial-gradient(circle at 35% 35%, #4ade80, var(--chip-g)); color:#fff; box-shadow:0 3px 12px rgba(21,128,61,.4), inset 0 1px 0 rgba(255,255,255,.2); }
  .chip.c50  { background:radial-gradient(circle at 35% 35%, #475569, var(--chip-k)); color:var(--gold); box-shadow:0 3px 12px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12); }
  .chip.c100 { background:radial-gradient(circle at 35% 35%, #a78bfa, var(--chip-p)); color:#fff; box-shadow:0 3px 12px rgba(109,40,217,.4), inset 0 1px 0 rgba(255,255,255,.2); }

  .bet-display { font-size:.9rem; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .bet-amount  { color:var(--gold); font-weight:600; font-size:.98rem; font-family:'Cinzel',serif; letter-spacing:.04em; }
  .btn-clr {
    background:none; border:1px solid rgba(185,28,28,.38);
    color:#f87171; border-radius:5px; padding:3px 10px;
    cursor:pointer; font-size:.72rem;
    font-family:'Cinzel',serif; letter-spacing:.06em;
    transition:all .15s;
  }
  .btn-clr:hover { background:rgba(185,28,28,.12); }

  /* ══ BARRE MOBILE ══ */
  #actionBar {
    display:none; position:fixed; bottom:0; left:0; right:0;
    background: rgba(3,12,7,.97);
    border-top:1px solid var(--border-hi);
    padding:10px 14px calc(10px + var(--safe-b));
    z-index:500; gap:8px;
    backdrop-filter:blur(20px);
  }
  #actionBar.show { display:flex; }
  .ab-btn {
    flex:1; border:none; border-radius:var(--radius-sm); min-height:54px; cursor:pointer;
    font-family:'Cinzel',serif; font-size:.82rem; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase;
    transition:transform .12s;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .ab-btn:active { transform:scale(.9); }
  .ab-hit    { background:linear-gradient(145deg,#166534,#16a34a); color:#fff; box-shadow:0 4px 16px rgba(22,163,74,.3); }
  .ab-stand  { background:linear-gradient(145deg,#991b1b,#dc2626); color:#fff; box-shadow:0 4px 16px rgba(220,38,38,.3); }
  .ab-double { background:linear-gradient(145deg,var(--gold-dk),var(--gold)); color:#050f09; box-shadow:0 4px 16px rgba(201,168,76,.3); }
  .ab-split  { background:linear-gradient(145deg,#4c1d95,#7c3aed); color:#fff; box-shadow:0 4px 16px rgba(124,58,237,.3); }

  /* Actions inline desktop */
  .inline-acts { display:none; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .ia-btn {
    flex:1; border:none; border-radius:var(--radius-sm); padding:10px 10px; cursor:pointer;
    font-family:'Cinzel',serif; font-size:.76rem; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; min-height:42px; transition:all .2s;
  }
  .ia-btn:hover  { transform:translateY(-1px); }
  .ia-btn:active { transform:scale(.95); }
  .ia-hit    { background:linear-gradient(145deg,#166534,#16a34a); color:#fff; }
  .ia-stand  { background:linear-gradient(145deg,#991b1b,#dc2626); color:#fff; }
  .ia-double { background:linear-gradient(145deg,var(--gold-dk),var(--gold)); color:#050f09; }

  /* ══ BANNIÈRE DRAMATIQUE ══ */
  .drama-banner {
    text-align:center; font-family:'Cinzel',serif;
    font-size:clamp(1rem,4vw,1.8rem); font-weight:700; letter-spacing:.06em;
    padding:20px 16px; margin:0 auto 22px; max-width:700px; border-radius:var(--radius-md);
    animation:popIn .6s cubic-bezier(.175,.885,.32,1.275);
  }
  .drama-win  { background:rgba(201,168,76,.07); border:1px solid rgba(201,168,76,.4); color:var(--gold); }
  .drama-lose { background:rgba(185,28,28,.1); border:1px solid rgba(185,28,28,.45); color:#f87171; }

  /* ══ RÉSULTATS ══ */
  #screenResults { display:none; min-height:100vh; padding:24px 14px 50px; }
  .results-title {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(1.6rem,7vw,3rem); color:var(--gold);
    text-align:center; margin-bottom:24px;
    text-shadow:0 0 40px rgba(201,168,76,.3);
    letter-spacing:.04em;
  }
  .results-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(min(100%,185px),1fr)); gap:12px; max-width:700px; margin:0 auto 28px; }
  .result-card {
    background: linear-gradient(145deg, rgba(9,36,22,.9), rgba(5,20,12,.95));
    border-radius:var(--radius-md); padding:20px; text-align:center;
    border:1px solid var(--border);
    box-shadow:0 4px 16px rgba(0,0,0,.4);
    animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
  }
  .result-card.win  { border-color:rgba(21,128,61,.6); background:linear-gradient(145deg,rgba(5,46,22,.92),rgba(3,30,14,.96)); box-shadow:0 4px 24px rgba(21,128,61,.15); }
  .result-card.lose { border-color:rgba(185,28,28,.55); background:linear-gradient(145deg,rgba(46,5,5,.92),rgba(30,3,3,.96)); box-shadow:0 4px 24px rgba(185,28,28,.12); }
  .result-card.push { border-color:rgba(201,168,76,.4); }
  .r-name     { font-family:'Cinzel',serif; font-size:clamp(.88rem,3.5vw,1.05rem); color:var(--gold); margin-bottom:7px; letter-spacing:.08em; }
  .r-outcome  { font-family:'Cinzel Decorative',serif; font-size:clamp(1.3rem,5vw,1.6rem); font-weight:700; margin-bottom:5px; }
  .r-outcome.win  { color:#4ade80; }
  .r-outcome.lose { color:#f87171; }
  .r-outcome.push { color:var(--gold); }
  .r-money    { font-size:.85rem; color:rgba(240,232,208,.55); margin-top:2px; font-style:italic; }
  .r-balance  { font-family:'Cinzel',serif; font-size:.82rem; color:var(--cream); margin-top:6px; letter-spacing:.04em; }

  .divider { display:flex; align-items:center; gap:10px; margin:16px auto; opacity:.2; max-width:700px; padding:0 14px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--gold); }
  .divider span { color:var(--gold); font-size:.78rem; }

  .results-acts { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; padding:0 14px; }
  .btn-new-round {
    flex:1; min-width:130px;
    background:linear-gradient(160deg,#c9a84c,#8a6f2e 60%,#c9a84c); background-size:200% 100%;
    border:none; border-radius:var(--radius-sm); padding:15px 18px;
    color:#050f09; font-family:'Cinzel',serif; font-size:.88rem; font-weight:700;
    letter-spacing:.12em; text-transform:uppercase; cursor:pointer; min-height:52px;
    box-shadow:0 4px 20px rgba(201,168,76,.28);
    transition:all .25s;
  }
  .btn-new-round:hover { background-position:100% 0; }
  .btn-new-round:active { transform:scale(.97); }
  .btn-chg-table {
    flex:1; min-width:110px; background:none;
    border:1px solid var(--border-hi);
    border-radius:var(--radius-sm); padding:15px 18px; color:var(--gold-dk);
    font-family:'Cinzel',serif; font-size:.82rem; letter-spacing:.1em; text-transform:uppercase;
    cursor:pointer; min-height:52px; transition:all .2s;
  }
  .btn-chg-table:hover { color:var(--gold); border-color:var(--gold); }
  .btn-chg-table:active { background:rgba(201,168,76,.06); }

  /* ══ TOAST ══ */
  #toast {
    position:fixed; top:14px; left:50%;
    transform:translateX(-50%) translateY(-120px);
    background:linear-gradient(135deg, rgba(18,45,30,.98), rgba(12,32,20,.99));
    border:1px solid var(--border-hi);
    color:var(--gold);
    padding:9px 22px; border-radius:30px;
    font-family:'Cinzel',serif; font-size:.78rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    box-shadow:0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(201,168,76,.1);
    transition:transform .35s cubic-bezier(.175,.885,.32,1.275);
    z-index:3000; white-space:nowrap; max-width:92vw; text-align:center;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* ══ DESKTOP ══ */
  @media(min-width:700px) {
    #screenGame { padding:20px; }
    #actionBar  { display:none !important; }
    .inline-acts { display:flex !important; }
    .dealer-zone { padding:22px; margin-bottom:16px; }
    .card { width:68px; height:96px; }
    .chip { width:42px; height:42px; }
    .players-zone { gap:14px; }
    .player-card { padding:18px; }
  }
</style>
</head>
<body>

<!-- ══ JOIN ══ -->
<div id="screenJoin">
  <div class="logo">
    <h1>BLACK JACK</h1>
    <div class="sub">Casino Royal — Multijoueur</div>
    <div class="suits">♠ ♥ ♦ ♣</div>
  </div>
  <div class="card-box">
    <h2>Entrer au Casino</h2>
    <form id="formJoin">
      <div class="field">
        <label>Votre nom</label>
        <input id="inputName" type="text" placeholder="Nom du joueur" maxlength="20" autocomplete="off" required>
      </div>
      <div class="field">
        <label>Rôle</label>
        <select id="selectRole">
          <option value="player">🃏 Joueur</option>
          <option value="dealer">🎩 Croupier</option>
        </select>
      </div>
      <div class="field">
        <label>Action</label>
        <div class="radio-group">
          <label><input type="radio" name="action" value="create" checked> Créer</label>
          <label><input type="radio" name="action" value="join"> Rejoindre</label>
        </div>
      </div>
      <div id="roomList" style="display:none;margin-bottom:12px"></div>
      <button type="submit" class="btn-gold">Entrer ♠</button>
    </form>
    <div class="join-error" id="joinError"></div>
    <div id="roomCodeBanner">
      <p>Code à partager</p>
      <div id="roomCodeDisplay">—</div>
    </div>
  </div>
</div>

<!-- ══ LOBBY ══ -->
<div id="screenLobby">
  <div class="logo">
    <h1>BLACK JACK</h1>
    <div class="suits">♠ ♥ ♦ ♣</div>
  </div>
  <div class="card-box">
    <h2>Salle d'attente</h2>
    <ul id="lobbyPlayersList"></ul>
    <p class="waiting-msg" id="waitingMsg" style="display:none">En attente du démarrage…</p>
    <div class="lobby-btn-group">
      <button id="btnStart" class="btn-gold" style="display:none">▶ Lancer la partie</button>
      <button id="btnLeaveRoom" class="btn-outline-red" onclick="window.gameActions.leaveRoom()">↩ Quitter le salon</button>
    </div>
  </div>
</div>

<!-- ══ JEU ══ -->
<div id="screenGame">
  <div class="game-header">
    <div class="game-title">♠ Black Jack</div>
    <button class="btn-quit" onclick="window.gameActions.leaveRoom()">↩ Quitter</button>
  </div>
  <div class="phase-banner" id="phaseBanner"></div>
  <div class="dealer-zone">
    <div class="zone-label">♦ Croupier ♦</div>
    <div class="dealer-name" id="dealerName"></div>
    <div class="hand" id="dealerHand"></div>
    <div class="hand-value" id="dealerValue"></div>
    <div class="dealer-actions" id="dealerActions"></div>
  </div>
  <div class="players-zone" id="playersZone"></div>
</div>

<!-- ══ BARRE MOBILE ══ -->
<div id="actionBar">
  <button class="ab-btn ab-hit"    onclick="window.gameActions.hit()">🃏 Tirer</button>
  <button class="ab-btn ab-stand"  onclick="window.gameActions.stand()">✋ Rester</button>
  <button class="ab-btn ab-double" id="abDouble" onclick="window.gameActions.double()" style="display:none">×2</button>
  <button class="ab-btn ab-split"  id="abSplit"  onclick="window.gameActions.split()"  style="display:none">✂</button>
</div>

<!-- ══ RÉSULTATS ══ -->
<div id="screenResults">
  <div class="results-title">✦ Résultats ✦</div>
  <div id="dramaticBanner" class="drama-banner" style="display:none"></div>
  <div class="results-grid" id="resultsGrid"></div>
  <div class="divider"><span>♦</span></div>
  <div style="text-align:center;font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.12em;color:var(--gold-dk);margin-bottom:22px;padding:0 14px;text-transform:uppercase">
    Score Croupier : <span id="dealerFinalScore" style="color:var(--cream)"></span>
  </div>
  <div class="results-acts">
    <button class="btn-new-round" id="btnNewRound" onclick="window.gameActions.newRound()">Nouvelle Manche ♠</button>
    <button class="btn-chg-table" onclick="window.gameActions.leaveRoom()">Changer de table</button>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="ui.js"></script>
<script src="client.js"></script>
</body>
</html>

<!-- ══════════ ÉCRAN 3 : RÉSULTATS ══════════ -->
<div id="screenResults">
  <div class="results-title">✦ Résultats ✦</div>
  <div id="dramaticBanner" class="drama-banner" style="display:none"></div>
  <div class="results-grid" id="resultsGrid"></div>
  <div class="divider"><span>♦</span></div>
  <div style="text-align:center;font-size:.92rem;color:var(--gold-dark);margin-bottom:20px;padding:0 14px">
    Score Croupier : <span id="dealerFinalScore" style="color:var(--cream)"></span>
  </div>
  <div class="results-acts">
    <button class="btn-new-round" id="btnNewRound" onclick="window.gameActions.newRound()">Nouvelle Manche ♠</button>
    <button class="btn-chg-table" onclick="window.gameActions.leaveRoom()">Changer de table</button>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="ui.js"></script>
<script src="client.js"></script>
</body>
</html>
